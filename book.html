<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shipment</title>
</head>
<body>
    <h2>Book a New Shipment</h2> 
    <form action="api_booking.php" method="POST">
        <label for="customer_id">Customer ID:</label>
        <input type="number" id="customer_id" name="customer_id" required><br><br>

         <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" name="weight" step="0.01" required><br><br>
        
        <label for="package_type">Package Type:</label>
        <select id="package_type" name="package_type" required>
            <option value="" disabled selected>Select Package Type</option>
            <option value="Document">Document</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Other">Other</option>
        </select><br><br>

        <label for="receiver_name">Receiver Name:</label>
        <input type="text" id="receiver_name" name="receiver_name" required><br><br>

        <label for="destination">Destination:</label>
        <input type="text" id="destination" name="destination" required><br><br>

        <button type="submit">Confirm Booking</button>
    </form>

    <script src="script.js"></script>
    <script></script>
</body>
</html>
