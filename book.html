<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shipment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #9fcaf5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        header {
            background-color: #f9f9f9;
            color: #0d6efd;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2rem; font-weight: 700; }
        .main-card {
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }
        .main-card h2 { color: #2980b9; font-weight: 600; margin-bottom: 25px; }
        .form-label { color: #444; font-weight: 500; }
        .btn-book {
            background-color: #2980b9;
            border: none;
            color: white;
            padding: 10px 30px;
            font-weight: 600;
            border-radius: 6px;
            width: 100%;
            margin-top: 5px;
        }
        .btn-book:hover { background-color: #1f618d; color: white; }
        footer {
            background-color: #f9f9f9;
            color: #0d6efd;
            text-align: center;
            padding: 20px;
            margin-top: auto;
            font-size: 0.9rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2980b9;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        .success-box {
            background-color: #eaf4ff;
            border: 1px solid #b3d7f5;
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
            display: none;
        }
        .success-box h4 { color: #2980b9; font-weight: 700; margin-bottom: 5px; }
        .courier-id {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f618d;
            letter-spacing: 2px;
        }
        .success-box p { color: #555; font-size: 0.9rem; margin-top: 8px; margin-bottom: 0; }
    </style>
</head>
<body>

    <header>
        <h1>Courier Tracking System</h1>
    </header>

    <div class="flex-grow-1 d-flex align-items-center justify-content-center p-4">
        <div class="main-card">
            <a href="index.html" class="back-link">← Back to Home</a>
            <h2>Book a New Shipment</h2>

            <form id="bookingForm">
                <div class="mb-3">
                    <label for="customer_name" class="form-label">Customer Name</label>
                    <input type="text" id="customer_name" name="customer_name"
                           class="form-control" placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label for="weight" class="form-label">Weight (kg)</label>
                    <input type="number" id="weight" name="weight"
                           class="form-control" step="0.01" placeholder="e.g. 2.50" required>
                </div>

                <div class="mb-3">
                    <label for="package_type" class="form-label">Package Type</label>
                    <select id="package_type" name="package_type" class="form-select" required>
                        <option value="" disabled selected>Select Package Type</option>
                        <option value="Document">Document</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="receiver_name" class="form-label">Receiver Name</label>
                    <input type="text" id="receiver_name" name="receiver_name"
                           class="form-control" placeholder="Who is receiving the package?" required>
                </div>

                <div class="mb-3">
                    <label for="destination" class="form-label">Destination</label>
                    <input type="text" id="destination" name="destination"
                           class="form-control" placeholder="Delivery address" required>
                </div>

                <button type="submit" class="btn btn-book">Confirm Booking</button>
            </form>

            <!-- Success box shown after booking -->
            <div class="success-box" id="successBox">
                <h4>✅ Shipment Booked!</h4>
                <div class="courier-id" id="courierIdDisplay"></div>
                <p>Save this Courier ID to track your package.</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Courier Tracking System. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
